events { worker_connections 1024; }

http {
    # ── Upstream services (Docker internal service names) ─────────────────────
    upstream frontend { server frontend:3000; }
    upstream backend  { server backend:8080;  }

    # ─────────────────────────────────────────────────────────────────────────
    # LOCAL / HTTP-only server — use this during development
    # For production with HTTPS, see nginx.prod.conf
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name aistock-analyzer.me;

        # ── Next.js frontend (all routes except /api) ─────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Spring Boot REST API ─────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
